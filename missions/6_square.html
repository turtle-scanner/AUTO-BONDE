<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-comments"></i>
        <h1>6. 안티그래비티 광장 (Square)</h1>
    </div>

    <div class="glass-card">
        <h3>[ CHECK ] 6-a. 출석체크 (오늘한줄)</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">매일 아침 전의를 다지는 한 줄 메시지.</p>
        <div style="margin-top: 1rem; display: flex; gap: 0.5rem;">
            <input type="text" placeholder="오늘의 각오를 남겨주세요" style="flex-grow: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.8rem; border-radius: 8px; color: white;">
            <button class="login-btn" style="width: auto; margin: 0;">출석</button>
        </div>
    </div>

    <div class="glass-card">
        <h3>[ CHAT ] 6-b. 소통 대화방</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">정예 요원들의 실시간 정보 교류 채널.</p>
        <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.2); border-radius: 12px; height: 150px; overflow-y: auto;">
            <p style="font-size: 0.8rem; margin-bottom: 0.5rem;"><b style="color: var(--primary);">minsu:</b> 비트코인 1억 돌파 직전이네요!</p>
            <p style="font-size: 0.8rem; margin-bottom: 0.5rem;"><b style="color: var(--accent-blue);">Olive:</b> 코스닥 에코프로 수급 들어오기 시작합니다.</p>
        </div>
    </div>

    <div class="glass-card">
        <h3>[ VISIT ] 6-c. 방문자 인사 신청</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">사령부 견학 및 예비 대원들의 인사 공간.</p>
        <p style="font-size: 0.8rem; color: var(--text-muted);">"사령부의 위엄에 압도되었습니다. 열심히 배워서 합류하겠습니다!"</p>
    </div>
</body>
</html>
