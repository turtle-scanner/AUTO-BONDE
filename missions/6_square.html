<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-comments"></i>
        <h1>6. 안티그래비티 광장 (Square)</h1>
    </div>
    <div class="glass-card">
        <h3>대원 간 정보 공유 및 소통</h3>
        <p style="color: var(--text-muted); margin-top: 1rem;">실시간 채팅과 출석체크를 통해 사령부의 결속을 다집니다.</p>
        <div style="margin-top: 2rem; height: 300px; background: rgba(0,0,0,0.2); border-radius: 16px; border: 1px solid var(--glass-border); padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; gap: 0.8rem;">
                <div style="width: 32px; height: 32px; background: var(--primary); border-radius: 8px; flex-shrink: 0;"></div>
                <div style="padding: 0.8rem; background: var(--glass-bg); border-radius: 0 12px 12px 12px; font-size: 0.85rem;">
                    <b>Captain cntfed:</b> 오늘 나스닥 선물 갭업 출발하네요. 다들 무리하지 맙시다!
                </div>
            </div>
            <div style="display: flex; gap: 0.8rem;">
                <div style="width: 32px; height: 32px; background: var(--accent-blue); border-radius: 8px; flex-shrink: 0;"></div>
                <div style="padding: 0.8rem; background: var(--glass-bg); border-radius: 0 12px 12px 12px; font-size: 0.85rem;">
                    <b>Agent 007:</b> 엔비디아 돌파 지점 확인했습니다. 정찰병 보냈습니다!
                </div>
            </div>
        </div>
    </div>
</body>
</html>
