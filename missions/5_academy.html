<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-graduation-cap"></i>
        <h1>5. 마스터 훈련소 (Academy)</h1>
    </div>
    <div class="glass-card">
        <h3>거장들의 지혜 계승</h3>
        <p style="color: var(--text-muted); margin-top: 1rem;">차트 패턴, 심리 조절, 그리고 매매 일지 복기를 통해 실력을 배양합니다.</p>
        <div style="margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
            <div style="padding: 1.2rem; background: var(--glass-bg); border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b style="color: var(--primary);">[ STUDY ] 컵앤핸들 패턴의 정석</b>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">윌리엄 오닐의 정수, 손잡이 형성 과정 분석</p>
                </div>
                <button class="login-btn" style="width: auto; margin: 0; padding: 0.5rem 1rem; font-size: 0.8rem;">학습 시작</button>
            </div>
            <div style="padding: 1.2rem; background: var(--glass-bg); border-radius: 12px; border: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <b style="color: var(--primary);">[ EXAM ] 정기 요원 승급 심사</b>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">30문항 중 28문항 이상 득점 시 '정예요원' 승급</p>
                </div>
                <button class="login-btn" style="width: auto; margin: 0; padding: 0.5rem 1rem; font-size: 0.8rem;">시험 응시</button>
            </div>
        </div>
    </div>
</body>
</html>
