<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-shield-halved"></i>
        <h1>4. 전략 및 리스크 (Risk Shield)</h1>
    </div>

    <div class="glass-card">
        <h3>[ REPORT ] 4-a. 프로 분석 리포트</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">사령부 AI가 분석한 오늘의 기술적 전술 브리핑.</p>
        <div style="margin-top: 1rem; border-left: 2px solid var(--primary); padding-left: 1rem;">
            <p style="font-size: 0.85rem; line-height: 1.5;">"현재 나스닥 지수는 과매수 구간에 진입했습니다. 돌파 매매 시 비중을 1/3로 줄이고 본절가 설정을 철저히 하십시오."</p>
        </div>
    </div>

    <div class="glass-card">
        <h3>[ CALC ] 4-b. 리스크 계산기</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">총 자산 대비 1% 손실 원칙에 기반한 포지션 사이징.</p>
        <div style="margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <input type="number" placeholder="진입가" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.8rem; border-radius: 8px; color: white;">
            <input type="number" placeholder="손절가" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 0.8rem; border-radius: 8px; color: white;">
        </div>
        <button class="login-btn" style="margin-top: 1rem;">적정 매수 비중 계산</button>
    </div>

    <div class="glass-card">
        <h3>[ SHIELD ] 4-c. 리스크 방패</h3>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">계좌 전체의 최대 낙폭(MDD) 제어 및 방어 전술.</p>
        <div style="margin-top: 1rem; display: flex; align-items: center; gap: 1rem;">
            <div style="width: 60px; height: 60px; border: 4px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800;">SAFE</div>
            <p style="font-size: 0.8rem;">현재 계좌 방어율 98.5%. 전술적 안정 상태입니다.</p>
        </div>
    </div>
</body>
</html>
