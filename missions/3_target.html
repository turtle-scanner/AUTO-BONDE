<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-crosshairs"></i>
        <h1>3. 주도주 추격대 (Target Scanner)</h1>
    </div>
    <div class="glass-card">
        <h3>실시간 주도주 타점 스캐너</h3>
        <p style="color: var(--text-muted); margin-top: 1rem;">시장의 모든 종목을 스캔하여 '돌파 타점'과 'VCP 응축' 종목을 포착합니다.</p>
        <div style="margin-top: 2rem;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-muted); font-size: 0.8rem; text-align: left;">
                        <th style="padding: 1rem;">TICKER</th>
                        <th style="padding: 1rem;">NAME</th>
                        <th style="padding: 1rem;">RS SCORE</th>
                        <th style="padding: 1rem;">STATUS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.03);">
                        <td style="padding: 1rem; font-weight: 800; color: var(--primary);">NVDA</td>
                        <td style="padding: 1rem;">엔비디아</td>
                        <td style="padding: 1rem;">98</td>
                        <td style="padding: 1rem;"><span style="color: var(--success);">[ BREAKOUT ]</span></td>
                    </tr>
                    <tr style="border-bottom: 1px solid rgba(255,255,255,0.03);">
                        <td style="padding: 1rem; font-weight: 800; color: var(--primary);">PLTR</td>
                        <td style="padding: 1rem;">팔란티어</td>
                        <td style="padding: 1rem;">94</td>
                        <td style="padding: 1rem;"><span style="color: var(--primary);">[ POCKET PIVOT ]</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
