<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-building-shield"></i>
        <h1>1. 본부 사령부 (HQ Command)</h1>
    </div>

    <div class="glass-card">
        <h3>[ ADMIN ] 1-a. 관리자 승인 센터</h3>
        <p style="color: var(--text-muted); margin-bottom: 1rem;">신규 대원들의 자격 심사를 집행합니다.</p>
        <div id="admin-list" style="margin-top: 1rem;">
            <p style="font-size: 0.8rem; color: var(--text-muted);">승인 대기 중인 인원이 없습니다.</p>
        </div>
    </div>

    <div class="glass-card">
        <h3>[ HR ] 1-b. HQ 인적 자원 사령부</h3>
        <p style="color: var(--text-muted); margin-bottom: 1.5rem;">사령부 소속 전체 대원 명부를 관리합니다.</p>
        
        <div style="overflow-x: auto;">
            <table id="member-table" style="width: 100%; border-collapse: collapse; font-size: 0.8rem;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--glass-border); color: var(--primary); text-align: left;">
                        <th style="padding: 10px;">ID</th>
                        <th style="padding: 10px;">GRADE</th>
                        <th style="padding: 10px;">REGION</th>
                        <th style="padding: 10px;">EXP</th>
                    </tr>
                </thead>
                <tbody id="member-body">
                    <!-- Data will be injected here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Data integration logic
        function refreshMemberData() {
            const data = window.parent.HQ_DATA || window.HQ_DATA;
            const body = document.getElementById('member-body');
            
            if (data && data.members && data.members.length > 0) {
                body.innerHTML = '';
                data.members.slice(0, 50).forEach(m => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = "1px solid rgba(255,255,255,0.03)";
                    tr.innerHTML = `
                        <td style="padding: 10px; font-weight: 700; color: white;">${m['아이디'] || '-'}</td>
                        <td style="padding: 10px; color: var(--success);">${m['등급'] || '회원'}</td>
                        <td style="padding: 10px; color: var(--text-muted);">${m['지역'] || '-'}</td>
                        <td style="padding: 10px; color: var(--text-muted);">${m['경력'] || '-'}</td>
                    `;
                    body.appendChild(tr);
                });
            } else {
                body.innerHTML = '<tr><td colspan="4" style="padding: 20px; text-align: center; color: var(--text-muted);">데이터를 불러오는 중이거나 명부가 비어있습니다.</td></tr>';
            }
        }

        // Initialize
        refreshMemberData();
        // Periodically refresh if needed
        setInterval(refreshMemberData, 5000);
    </script>

    <div class="glass-card">
        <h3>[ SECURE ] 1-c. 계정 보안 관리</h3>
        <button class="login-btn" style="width: auto; padding: 0.5rem 1.5rem;">비밀번호 변경</button>
    </div>

    <div class="glass-card" style="border: 1px solid rgba(255, 75, 75, 0.2);">
        <h3 style="color: #ff4b4b;">[ EXIT ] 1-d. 탈퇴/휴식 신청</h3>
        <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.5rem;">탈퇴 시 모든 활동 데이터와 등급이 영구 삭제됩니다.</p>
        <button style="margin-top: 1rem; background: transparent; border: 1px solid #ff4b4b; color: #ff4b4b; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">탈퇴 신청</button>
    </div>
</body>
</html>
