<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-robot"></i>
        <h1>7. 자동매매 사령부 (Auto-Bonde)</h1>
    </div>
    <div class="glass-card">
        <h3>24/7 무중력 자동 매매 엔진</h3>
        <p style="color: var(--text-muted); margin-top: 1rem;">고도로 훈련된 알고리즘이 감정을 배제하고 기계적으로 수익을 쌓아갑니다.</p>
        <div style="margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div style="padding: 1.5rem; background: rgba(0, 255, 136, 0.05); border-radius: 20px; border: 1px solid var(--success); text-align: center;">
                <div style="font-size: 0.7rem; color: var(--success); text-transform: uppercase; margin-bottom: 0.5rem;">Engine Status</div>
                <h2 style="color: var(--success); font-weight: 800;">● ONLINE</h2>
                <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">V6.0 Platinum Logic Active</p>
            </div>
            <div style="padding: 1.5rem; background: var(--glass-bg); border-radius: 20px; border: 1px solid var(--glass-border); text-align: center;">
                <div style="font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem;">Today's Execution</div>
                <h2 style="color: white; font-weight: 800;">14 Trades</h2>
                <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7;">Win Rate: 72%</p>
            </div>
        </div>
    </div>
</body>
</html>
