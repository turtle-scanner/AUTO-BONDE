<!DOCTYPE html>
<html lang="ko">
<body>
    <div class="module-header">
        <i class="fa-solid fa-satellite-dish"></i>
        <h1>2. 시장 상황실 (Market Ops)</h1>
    </div>
    <div class="glass-card">
        <h3>글로벌 마켓 트렌드 요약</h3>
        <p style="color: var(--text-muted); margin-top: 1rem;">나스닥, 코스피, 환율 등 주요 거시 지표를 실시간으로 모니터링합니다.</p>
        <div style="margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div style="padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--glass-border);">
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">[ TREND ]</div>
                <h4 style="color: var(--primary);">Bull Market Confirmation</h4>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">주요 지수가 20일 이동평균선 위에서 견고하게 지지받고 있습니다.</p>
            </div>
            <div style="padding: 1.5rem; background: rgba(255,255,255,0.03); border-radius: 16px; border: 1px solid var(--glass-border);">
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">[ SENTIMENT ]</div>
                <h4 style="color: var(--success);">Greed (68 pts)</h4>
                <p style="font-size: 0.85rem; margin-top: 0.5rem;">시장 참여자들의 매수 의지가 강하며, 변동성 지수(VIX)가 하향 안정화되었습니다.</p>
            </div>
        </div>
    </div>
</body>
</html>
