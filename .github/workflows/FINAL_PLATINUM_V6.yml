name: FINAL PLATINUM V6 (Next.js Deploy)

on:
  workflow_dispatch:

jobs:
  final_deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Next.js)
        run: |
          cd v6_terminal
          npm install

      - name: Build Next.js
        run: |
          cd v6_terminal
          npm run build

      - name: Sync Python Dependencies (Bot)
        run: |
          pip install -r requirements.txt

      - name: Ultimate Cleanup
        run: |
          # 80번 포트 및 기존 프로세스 종료
          sudo fuser -k 80/tcp || true
          sudo pkill -9 -f next-server || true
          sudo pkill -9 -f streamlit || true
          sudo pkill -9 -f python || true
          sleep 2

      - name: Launch Next.js Terminal (Port 80)
        run: |
          cd v6_terminal
          # 80번 포트로 Next.js 실행 (관리자 권한 필요)
          sudo nohup npm run start -- -p 80 > ../terminal.log 2>&1 &

      - name: Launch Gemini Telegram Bot
        run: |
          nohup python gemini_interactive_bot.py > bot.log 2>&1 &
          disown

      - name: Final Verification
        run: |
          sleep 15
          echo "--- NETWORK STATUS ---"
          sudo ss -tulpn | grep ":80"
          echo "--- PROCESS LIST ---"
          ps aux | grep -E "next|gemini"
          echo "--- LOG PREVIEW ---"
          tail -n 20 terminal.log
