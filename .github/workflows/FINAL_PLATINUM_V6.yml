name: FINAL PLATINUM V6 (Next.js Deploy)

on:
  workflow_dispatch:

jobs:
  final_deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Next.js)
        run: |
          cd v6_terminal
          npm install

      - name: Build Next.js
        run: |
          cd v6_terminal
          NODE_OPTIONS="--max-old-space-size=1536" npm run build -- --no-lint

      - name: Create Environment File
        run: |
          echo "KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}" > .env
          echo "KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}" >> .env
          echo "KIS_ACCOUNT_NO=${{ secrets.KIS_ACCOUNT_NO }}" >> .env
          echo "KIS_MOCK_TRADING=${{ secrets.KIS_MOCK_TRADING }}" >> .env
          echo "TELEGRAM_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          cp .env v6_terminal/.env

      - name: Sync Python Dependencies (Bot)
        run: |
          pip install -r requirements.txt

      - name: Ultimate Cleanup
        run: |
          # 기존 Next.js 프로세스만 종료 (Nginx/80번은 건드리지 않음)
          sudo pkill -9 -f next-server || true
          sudo pkill -9 -f node || true
          sleep 2

      - name: Start/Restart All Services (PM2)
        run: |
          # 1. API 서버 가동 (포트 8000)
          /usr/bin/pm2 delete api-server || true
          /usr/bin/pm2 start api_server.py --name "api-server" --interpreter python3
          
          # 3. 자동 매매 및 봇 가동
          /usr/bin/pm2 delete dragonfly-bot || true
          /usr/bin/pm2 start gemini_interactive_bot.py --name "dragonfly-bot" --interpreter python3
          
          /usr/bin/pm2 delete headless-trader || true
          /usr/bin/pm2 start headless_dragonfly_bot.py --name "headless-trader" --interpreter python3
          
          # 4. 웹 터미널 가동 (내부 포트 3000)
          cd v6_terminal
          /usr/bin/pm2 delete v6-terminal || true
          /usr/bin/pm2 start npm --name "v6-terminal" -- start -- -p 3000
          
          # 4. 배포 완료 알림 (텔레그램)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=🚀 [STOCKDRAGONFLY V6.0] 사령부 배포 완료!%0A✅ 도메인: https://stockdragonfly.cloud%0A✅ 모든 시스템(API, BOT, WEB) 정상 가동 중입니다."
          
          /usr/bin/pm2 save

      - name: Final Verification
        run: |
          sleep 20
          echo "--- 🛡️ PLATINUM SYSTEM STATUS ---"
          sudo ss -tulpn | grep -E ":3000|:8000"
          echo "--- 🤖 PROCESS MONITORING ---"
          /usr/bin/pm2 status
          echo "--- 📡 NETWORK ACCESSIBILITY ---"
          curl -I http://localhost:3000
