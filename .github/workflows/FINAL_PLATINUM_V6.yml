name: FINAL PLATINUM V6 (Next.js Deploy)

on:
  workflow_dispatch:

jobs:
  final_deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (Next.js)
        run: |
          cd v6_terminal
          npm install

      - name: Build Next.js
        run: |
          cd v6_terminal
          npm run build

      - name: Sync Python Dependencies (Bot)
        run: |
          pip install -r requirements.txt

      - name: Ultimate Cleanup
        run: |
          # 80번 포트(웹) 및 기존 Next.js 프로세스만 종료
          sudo fuser -k 80/tcp || true
          sudo pkill -9 -f next-server || true
          sudo pkill -9 -f node || true
          sleep 2

      - name: Start/Restart Next.js Terminal & API Server (PM2)
        run: |
          # 1. API 서버 가동 (포트 8000)
          /usr/bin/pm2 delete api-server || true
          /usr/bin/pm2 start api_server.py --name "api-server" --interpreter python3
          
          # 2. 웹 터미널 가동 (포트 80)
          cd v6_terminal
          /usr/bin/pm2 delete v6-terminal || true
          /usr/bin/pm2 start npm --name "v6-terminal" -- start -- -p 80
          
          /usr/bin/pm2 save

      - name: Final Verification
        run: |
          sleep 15
          echo "--- NETWORK STATUS ---"
          sudo ss -tulpn | grep ":80"
          echo "--- PROCESS LIST ---"
          ps aux | grep -E "next|gemini"
          echo "--- LOG PREVIEW ---"
          tail -n 20 terminal.log
