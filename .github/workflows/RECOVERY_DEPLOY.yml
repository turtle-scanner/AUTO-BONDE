name: RECOVERY DEPLOY

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  recovery_deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Dependencies
        run: |
          pip install -r requirements.txt

      - name: Deep Clean & Firewall
        run: |
          # Kill EVERYTHING using port 8501 or 80
          sudo fuser -k 8501/tcp || true
          sudo fuser -k 80/tcp || true
          sudo pkill -9 -f streamlit || true
          
          # Force open ports on OS level
          sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT || true
          sudo iptables -I INPUT -p tcp --dport 8501 -j ACCEPT || true
          sudo ufw allow 80/tcp || true
          sudo ufw allow 8501/tcp || true
          sleep 2

      - name: Launch Platinum V6.0 Terminal (Port 80 Attempt)
        run: |
          # Try to run on port 80 first (most direct for Cloudflare)
          # If this fails, it might be due to permissions or another webserver
          sudo nohup streamlit run app.py --server.port 80 --server.address 0.0.0.0 --server.headless true --server.enableCORS false --server.enableXsrfProtection false > terminal.log 2>&1 &
          
      - name: Launch Gemini Telegram Bot
        run: |
          sudo pkill -f gemini_interactive_bot || true
          nohup python gemini_interactive_bot.py > bot.log 2>&1 &
          disown
          
      - name: Detailed Diagnostics
        run: |
          sleep 10
          echo "--- NETWORK DIAGNOSTICS ---"
          sudo ss -tulpn | grep -E "80|8501"
          echo "--- PROCESS LIST ---"
          ps aux | grep -E "streamlit|gemini"
          echo "--- LOG PREVIEW ---"
          tail -n 20 terminal.log
