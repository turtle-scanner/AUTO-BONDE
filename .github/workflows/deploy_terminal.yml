name: Deploy V6.0 Terminal

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Dependencies
        run: |
          pip install -r requirements.txt

      - name: Kill Existing Processes
        run: |
          # Kill streamlit and the gemini bot
          pkill -f "streamlit run app.py" || true
          pkill -f "python gemini_interactive_bot.py" || true
          sleep 2

      - name: Launch Platinum V6.0 Terminal
        run: |
          # Use port 80 to match Cloudflare's expected origin port
          # This requires sudo on most Linux systems
          sudo nohup streamlit run app.py --server.port 80 --server.headless true > terminal.log 2>&1 &
          
      - name: Launch Gemini Telegram Bot
        run: |
          nohup python gemini_interactive_bot.py > bot.log 2>&1 &
          disown
          
      - name: Verification
        run: |
          sleep 5
          ps aux | grep streamlit
