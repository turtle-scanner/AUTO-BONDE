name: Deploy V6.0 Terminal

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Dependencies
        run: |
          pip install -r requirements.txt

      - name: Kill Existing Processes
        run: |
          # Kill all existing streamlit and gemini processes to clear ports
          sudo pkill -f streamlit || true
          sudo pkill -f gemini_interactive_bot || true
          sudo lsof -t -i:80 | xargs sudo kill -9 || true
          sudo lsof -t -i:8501 | xargs sudo kill -9 || true
          sleep 2

      - name: Open Firewall Ports
        run: |
          # Force open ports on OS level
          sudo iptables -I INPUT -p tcp --dport 80 -j ACCEPT || true
          sudo iptables -I INPUT -p tcp --dport 8501 -j ACCEPT || true
          sudo ufw allow 80/tcp || true
          sudo ufw allow 8501/tcp || true

      - name: Launch Platinum V6.0 Terminal
        run: |
          # Revert to stable port 8501 and run as background
          nohup streamlit run app.py --server.port 8501 --server.headless true > terminal.log 2>&1 &
          
      - name: Launch Gemini Telegram Bot
        run: |
          nohup python gemini_interactive_bot.py > bot.log 2>&1 &
          disown
          
      - name: Verification
        run: |
          sleep 5
          echo "--- ACTIVE PROCESSES ---"
          ps aux | grep -E "streamlit|gemini"
          echo "--- PORT LISTENING STATUS ---"
          sudo netstat -tulpn | grep -E "80|8501"
