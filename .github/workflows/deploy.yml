name: Deploy StockDragonfly Terminal

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Stop existing services to free memory
        run: |
          pm2 stop dragonfly || true
          pm2 stop bonde-api || true
          # Free up memory
          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Install dependencies
        run: npm install --production=false

      - name: Build Next.js (Standalone)
        run: |
          # 1G RAM 환경을 위한 Node 옵션 설정
          export NODE_OPTIONS="--max-old-space-size=768"
          npm run build

      - name: Setup Standalone Build
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Restart Services
        run: |
          # Standalone 서버 실행 (PM2)
          pm2 delete dragonfly || true
          pm2 start .next/standalone/server.js --name dragonfly --env production
          
          # API 서버 실행 (필요한 경우)
          # pm2 start api_server.py --name bonde-api --interpreter python3
          
          pm2 save
