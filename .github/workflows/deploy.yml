name: Deploy StockDragonfly Terminal

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Stop existing services to free memory
        run: |
          pm2 stop dragonfly || true
          # Free up memory
          sync && echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js (Standalone)
        run: |
          # 1G RAM 환경을 위한 Node 옵션 설정 (강력 최적화)
          export NODE_OPTIONS="--max-old-space-size=512"
          npm run build

      - name: Setup Standalone Build
        run: |
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      - name: Restart Services
        run: |
          # Standalone 서버 실행 (PM2)
          pm2 delete dragonfly || true
          pm2 start .next/standalone/server.js --name dragonfly --env production --node-args="--max-old-space-size=512"
          pm2 save
