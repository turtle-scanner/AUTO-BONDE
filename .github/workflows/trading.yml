name: Bonde Trading Bot

on:
  schedule:
    # 한국 시간 기준 평일 오전 8시 30분에 시작 (UTC 23:30)
    - cron: '30 23 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Bonde Bot
        env:
          # 시크릿 설정 (GitHub Repo Settings > Secrets에 등록 필요)
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 봇 실행 (장 종료 시간까지 실행되도록 타임아웃 설정 가능)
          # GitHub Action은 최대 6시간까지 실행 가능하므로 장 시간과 일치함
          python bonde_procedural_bot.py
