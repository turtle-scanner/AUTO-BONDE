name: Bonde Trading Bot

on:
  schedule:
    # 한국 시간 기준 평일 오전 8시 30분에 시작 (UTC 23:30)
    - cron: '30 23 * * 1-5'
  workflow_dispatch: # 수동 실행 가능

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bonde Bot
        env:
          KIS_MY_APP: ${{ secrets.KIS_MY_APP }}
          KIS_MY_SEC: ${{ secrets.KIS_MY_SEC }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # PYTHONPATH 설정 (절대 경로로 확실하게 추가)
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/strategy_builder"
          # 현재는 장외 시간일 경우 자동으로 종료되도록 Python 코드가 수정되었습니다.
          python bonde_procedural_bot.py
