<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI GRAVITY - Quant Trading Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <div class="form-box login">
            <h2>DRAGONFLY Login</h2>
            <p>DRAGONFLY 주식 정보 웹에 로그인하세요</p>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" required>
                    <label>사령부 아이디</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>비밀번호</label>
                </div>
                <button type="submit" class="btn">로그인</button>
                <div class="switch-form">
                    계정이 없으신가요? <a href="#" id="go-to-signup">회원가입</a>
                </div>
            </form>
        </div>

        <div class="form-box signup hidden">
            <h2>Join DRAGONFLY</h2>
            <p>DRAGONFLY 주식 정보 웹에 가입하세요</p>
            <form id="signup-form">
                <div class="input-group">
                    <input type="text" required>
                    <label>이름 (닉네임)</label>
                </div>
                <div class="input-group">
                    <input type="text" required>
                    <label>사령부 아이디</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>비밀번호</label>
                </div>
                <div class="input-group">
                    <input type="password" required>
                    <label>비밀번호 확인</label>
                </div>
                <button type="submit" class="btn signup-btn">회원가입 완료</button>
                <div class="switch-form">
                    이미 계정이 있으신가요? <a href="#" id="go-to-login">로그인</a>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js?v=4"></script>
</body>
</html>
