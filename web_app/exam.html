<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTI GRAVITY - 자격 시험</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { overflow-y: auto; }
        .exam-container { max-width: 900px; margin: 40px auto; padding: 40px; background: rgba(15,15,20,0.95); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        .exam-header { text-align: center; margin-bottom: 40px; }
        .timer-box { position: fixed; top: 20px; right: 20px; background: #ef4444; color: white; padding: 10px 25px; border-radius: 30px; font-weight: 800; font-size: 22px; z-index: 1000; box-shadow: 0 5px 15px rgba(239,68,68,0.4); display: none; }
        .timer-box.warning { background: #fef01b; color: #000; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .question-card { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .question-card:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
        .question-text { font-size: 18px; font-weight: 800; margin-bottom: 20px; color: white; line-height: 1.5; }
        
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-label { display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 15px; border-radius: 8px; transition: 0.2s; background: rgba(0,0,0,0.3); color: var(--text-muted); border: 1px solid transparent; }
        .option-label:hover { background: rgba(255,255,255,0.05); color: white; }
        .option-label.selected { border-color: #ef4444; background: rgba(239,68,68,0.1); color: white; }
        .option-label input[type="radio"] { accent-color: #ef4444; width: 18px; height: 18px; cursor: pointer; }
        
        .result-box { text-align: center; padding: 50px 20px; display: none; }
        .pass-text { color: #22c55e; font-size: 36px; font-weight: 800; margin-bottom: 15px; }
        .fail-text { color: #ef4444; font-size: 36px; font-weight: 800; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="timer-box" id="timer">10:00</div>

    <div class="exam-container" id="main-container">
        <div class="exam-header">
            <p style="color: #ef4444; font-weight: 800; margin-bottom: 5px;">[ JOIN ] Join Command (자격 시험)</p>
            <h1 style="color: #fef01b; font-size: 32px; margin-bottom: 15px;">사령부 정예 요원 입성 자격 시험</h1>
            <p style="color: var(--text-muted); font-size: 16px;">시험 만점(30/30) 중 25점 이상을 획득해야 사령부 승인이 완료됩니다.<br>(기본시장 10제, 윌리엄오닐 기법 10제, 상승/하락장 행동 10제)</p>
        </div>

        <div id="intro-form">
            <div style="background: rgba(255,255,255,0.03); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div>
                        <label style="color: var(--text-main); font-weight: 800; display: block; margin-bottom: 8px;">연령대</label>
                        <select class="input-field" style="width:100%;">
                            <option>20대 이하</option><option>30대</option><option>40대</option><option>50대 이상</option>
                        </select>
                    </div>
                    <div>
                        <label style="color: var(--text-main); font-weight: 800; display: block; margin-bottom: 8px;">성별</label>
                        <div style="display: flex; gap: 20px; padding: 12px 15px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--glass-border);">
                            <label style="color: white; cursor: pointer; display:flex; align-items:center; gap:5px;"><input type="radio" name="gender" checked style="accent-color:#ef4444;"> 남성</label>
                            <label style="color: white; cursor: pointer; display:flex; align-items:center; gap:5px;"><input type="radio" name="gender" style="accent-color:#ef4444;"> 여성</label>
                        </div>
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <label style="color: var(--text-main); font-weight: 800; display: block; margin-bottom: 8px;">주식 경력</label>
                        <select class="input-field" style="width:100%;">
                            <option>1년 미만</option><option>1~3년</option><option>3~5년</option><option>5년 이상</option>
                        </select>
                    </div>
                </div>
                <div style="margin-bottom: 30px;">
                    <label style="color: var(--text-main); font-weight: 800; display: block; margin-bottom: 8px;">입성에 임하는 각오</label>
                    <textarea class="input-field" style="width:100%; height:100px; resize: none;" placeholder="예: 무지성 뇌동매매를 버리고 원칙을 지키는 요원이 되겠습니다."></textarea>
                </div>
                <button class="btn-primary" style="width: 100%; font-size: 20px; padding: 18px; border-radius: 12px;" id="start-exam-btn">시험 시작 (제한시간 10분)</button>
            </div>
        </div>

        <div id="exam-form" style="display: none;">
            <div id="questions-container"></div>
            <button class="btn-primary" style="width: 100%; font-size: 20px; padding: 20px; margin-top: 40px; border-radius: 12px;" id="submit-exam-btn">답안 최종 제출하기</button>
        </div>

        <div id="result-box" class="result-box">
            <h1 id="result-status"></h1>
            <p id="result-score" style="color: white; font-size: 24px; margin-bottom: 30px; font-weight: 800;"></p>
            <p id="result-msg" style="color: var(--text-muted); margin-bottom: 40px; line-height: 1.6; font-size: 18px;"></p>
            <button class="btn-primary" id="go-dashboard-btn" style="display: none; width: 100%; padding: 20px; font-size: 20px;">자랑스러운 대시보드 입장</button>
            <button class="btn-outline" id="retry-exam-btn" style="display: none; width: 100%; padding: 20px; font-size: 20px;">시험 다시 응시하기</button>
        </div>
    </div>

    <script src="exam.js"></script>
</body>
</html>
