<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 모드 - ANTI GRAVITY</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-top: 20px;
        }
        .admin-table th, .admin-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #fff;
        }
        .admin-table th {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
        }
        .admin-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        .text-muted { color: var(--text-muted); }
    </style>
</head>
<body class="dashboard-body">
    <div class="background-animation"></div>
    <div class="admin-container">
        <header class="dashboard-header">
            <h2>🛡️ <span>관리자</span> 컨트롤 패널</h2>
            <button id="back-btn" class="btn-small">대시보드로 돌아가기</button>
        </header>
        
        <p class="text-muted">가입된 모든 회원의 정보 및 입력한 API 키 내역을 안전하게 조회합니다.</p>
        
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>이름 (닉네임)</th>
                    <th>이메일</th>
                    <th>등급</th>
                    <th>API KEY 상태</th>
                    <th>가입일시</th>
                </tr>
            </thead>
            <tbody id="user-table-body">
                <!-- Data injected here -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const userData = JSON.parse(localStorage.getItem('user'));
            // 관리자(LV 7)만 접근 가능
            if (!userData || userData.role_level !== 7) {
                alert('접근 권한이 없습니다! 관리자(LV.7) 전용 페이지입니다.');
                window.location.href = 'dashboard.html';
                return;
            }

            document.getElementById('back-btn').addEventListener('click', () => {
                window.location.href = 'dashboard.html';
            });

            try {
                // FastAPI 백엔드에서 모든 회원 데이터 요청
                const res = await fetch(`http://localhost:8000/api/admin/users?admin_id=${userData.id}`);
                const data = await res.json();
                
                if (res.ok) {
                    const tbody = document.getElementById('user-table-body');
                    tbody.innerHTML = '';
                    
                    data.users.forEach(u => {
                        const tr = document.createElement('tr');
                        const apiKeyStatus = u.kis_app_key ? `<span style="color:#10b981">입력됨 (Hidden)</span>` : `<span style="color:#ef4444">미입력</span>`;
                        tr.innerHTML = `
                            <td>${u.user_id}</td>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                            <td><span class="badge" style="background:#3b82f6">${u.role_name}</span></td>
                            <td>${apiKeyStatus}</td>
                            <td class="text-muted">${u.created_at}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                } else {
                    alert('데이터를 불러오지 못했습니다.');
                }
            } catch (err) {
                alert('서버 연결 오류. FastAPI가 실행 중인지 확인하세요.');
            }
        });
    </script>
</body>
</html>
